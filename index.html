document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

       <\u002Fdiv>\n                <sc-for list=\"{{ members }}\" as=\"m\" hint-placeholder-count=\"5\">\n                  <div style=\"display: grid; grid-template-columns: 1.6fr 1.2fr 1fr 1.2fr; gap: 8px; padding: 13px 18px; align-items: center; border-bottom: 1px solid #F0F3F8; font-size: 13.5px;\" style-hover=\"background: #FAFBFD;\">\n                    <div style=\"font-weight: 600;\">{{ m.name }}<\u002Fdiv>\n                    <div dir=\"ltr\" style=\"text-align: end; color: #5B6778; font-size: 13px;\">{{ m.phone }}<\u002Fdiv>\n                    <div><span style=\"font-size: 12px; font-weight: 700; padding: 3px 12px; border-radius: 12px; background: {{ m.stBg }}; color: {{ m.stColor }};\">{{ m.status }}<\u002Fspan><\u002Fdiv>\n                    <div style=\"display: flex; gap: 6px;\">\n                      <button style=\"border: 1px solid #D5DDE8; background: #fff; border-radius: 7px; padding: 4px 12px; font-size: 12px; font-weight: 600; color: #3D4A61; cursor: pointer;\">עריכה<\u002Fbutton>\n                      <button style=\"border: 1px solid #D5DDE8; background: #fff; border-radius: 7px; padding: 4px 12px; font-size: 12px; font-weight: 600; color: #3D4A61; cursor: pointer;\">{{ m.action }}<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <div style=\"padding: 12px 18px; font-size: 12.5px; color: #7A8699;\">מוצגים 6 מתוך 58 חברים · המזהה במערכת: מספר הטלפון<\u002Fdiv>\n              <\u002Fdiv>\n\n              <h2 style=\"margin: 0 0 12px; font-size: 17px; font-weight: 800;\">הרשאות מנהלים<\u002Fh2>\n              <div style=\"background: #FFFFFF; border-radius: 14px; border: 1px solid #E2E8F2; overflow: hidden;\">\n                <div style=\"display: grid; grid-template-columns: 1.6fr 1.6fr 1fr; gap: 8px; padding: 12px 18px; background: #F7F9FC; font-size: 12.5px; font-weight: 700; color: #7A8699; border-bottom: 1px solid #E2E8F2;\">\n                  <div>שם<\u002Fdiv><div>דוא\"ל<\u002Fdiv><div>תפקיד<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display: grid; grid-template-columns: 1.6fr 1.6fr 1fr; gap: 8px; padding: 13px 18px; align-items: center; border-bottom: 1px solid #F0F3F8; font-size: 13.5px;\">\n                  <div style=\"font-weight: 600;\">רונית קדם<\u002Fdiv><div dir=\"ltr\" style=\"text-align: end; color: #5B6778; font-size: 13px;\">editor@bechirot.gov.il<\u002Fdiv><div><span style=\"font-size: 12px; font-weight: 700; padding: 3px 12px; border-radius: 12px; background: #EAF1FB; color: #2A5DA8;\">עורכת משאלים<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display: grid; grid-template-columns: 1.6fr 1.6fr 1fr; gap: 8px; padding: 13px 18px; align-items: center; font-size: 13.5px;\">\n                  <div style=\"font-weight: 600;\">עמית בר-און<\u002Fdiv><div dir=\"ltr\" style=\"text-align: end; color: #5B6778; font-size: 13px;\">admin@bechirot.gov.il<\u002Fdiv><div><span style=\"font-size: 12px; font-weight: 700; padding: 3px 12px; border-radius: 12px; background: #16233F; color: #fff;\">מנהל מערכת<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fsc-if>\n\n  <!-- Manager decision confirmation modal -->\n  <sc-if value=\"{{ mgrModalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position: fixed; inset: 0; background: rgba(11,20,26,.5); display: flex; align-items: center; justify-content: center; z-index: 60; padding: 20px;\" onclick=\"{{ closeMgrModal }}\">\n      <div dir=\"rtl\" style=\"background: #FFFFFF; border-radius: 16px; padding: 28px 26px; width: 440px; max-width: 100%; box-shadow: 0 20px 60px rgba(10,18,35,.4); animation: msgIn .2s ease;\" onclick=\"{{ stopProp }}\">\n        <div style=\"font-size: 17px; font-weight: 800; margin-bottom: 8px;\">אישור החלטות מנהל<\u002Fdiv>\n        <div style=\"font-size: 13.5px; color: #3D4A61; line-height: 1.65; margin-bottom: 6px;\">{{ mgrModalSummary }}<\u002Fdiv>\n        <div style=\"font-size: 13px; color: #7A8699; line-height: 1.6; background: #F7F9FC; border-radius: 8px; padding: 10px 12px; margin-bottom: 18px;\">ההחלטות יתועדו בלוג הביקורת ובפרוטוקול בשמך (רונית קדם).<\u002Fdiv>\n        <div style=\"display: flex; gap: 10px;\">\n          <button onclick=\"{{ confirmMgr }}\" style=\"flex: 1; border: none; border-radius: 10px; background: #F59E0B; color: #fff; font-size: 14px; font-weight: 700; padding: 12px; cursor: pointer;\" style-hover=\"background: #D97706;\">אשר וחתום<\u002Fbutton>\n          <button onclick=\"{{ closeMgrModal }}\" style=\"border: 1px solid #D5DDE8; border-radius: 10px; background: #fff; color: #3D4A61; font-size: 14px; font-weight: 600; padding: 12px 20px; cursor: pointer;\">ביטול<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- Toast -->\n  <sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position: fixed; bottom: 24px; inset-inline-start: 50%; transform: translateX(50%); background: #16233F; color: #fff; padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 600; box-shadow: 0 8px 30px rgba(10,18,35,.35); z-index: 50; animation: msgIn .25s ease;\">{{ toast }}<\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: &quot;1440px&quot;, &quot;height&quot;: &quot;960px&quot;}, &quot;startView&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;whatsapp&quot;, &quot;options&quot;: [&quot;whatsapp&quot;, &quot;dashboard&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;תצוגה&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.questions = [\n      'האם אתה מאשר את תקן הוועדה לשנת 2026?',\n      'האם אתה מאשר את תקציב הוועדה לשנת 2026?'\n    ];\n    this.cannedComments = [\n      'מאשר את התקן, בכפוף לעדכון מצבת כוח האדם של מטה הלוגיסטיקה לקראת יום הבחירות.',\n      'מאשר את התקציב, בכפוף לכך שסעיף ההסברה יעודכן בהתאם לסיכום מישיבת המליאה האחרונה.'\n    ];\n    this.state = {\n      view: (props && props.startView) === 'dashboard' ? 'dash' : 'wa',\n      // WhatsApp flow\n      scenario: 'flow', started: false, sheetFor: null,\n      answers: [null, null], commentSent: [false, false], changed: false,\n      classification: [null, null], clsRem: null,\n      // Manager decision (F10)\n      mgrChoices: {}, mgrModal: false, mgrDone: false,\n      // Dashboard\n      loggedIn: false, mfaStep: false, mfaCode: '',\n      dashScreen: 'polls', emptyPolls: false, resQ: 0,\n      commentsDone: { 3: true },\n      secondsAgo: 2, toast: null,\n      // New poll form\n      npTitle: 'אישור תקן ותקציב הוועדה לשנת 2026',\n      npText: 'מליאת ועדת הבחירות המרכזית מתבקשת להצביע על 2 שאלות, כפי שהוצגו במליאה ביום 30.6.2026.',\n      npDeadline: 'יום שני 6.7.2026, 18:00',\n      npQuestions: [\n        'האם אתה מאשר את תקן הוועדה לשנת 2026?',\n        'האם אתה מאשר את תקציב הוועדה לשנת 2026?'\n      ]\n    };\n  }\n\n  componentDidMount() {\n    this._tick = setInterval(() => {\n      this.setState(s => ({ secondsAgo: (s.secondsAgo % 5) + 1 }));\n    }, 1200);\n  }\n  componentWillUnmount() { clearInterval(this._tick); clearTimeout(this._toastT); }\n\n  showToast(msg) {\n    clearTimeout(this._toastT);\n    this.setState({ toast: msg });\n    this._toastT = setTimeout(() => this.setState({ toast: null }), 2600);\n  }\n\n  sumLabel(s, i, labels) {\n    if (!s.answers[i]) return '';\n    if (s.answers[i] === 'forComments') {\n      if (s.classification[i] === 'comment') return '✅ בעד (הערה לפרוטוקול)';\n      if (s.classification[i] === 'condition') return '⚠️ בעד מותנה';\n    }\n    return labels[s.answers[i]];\n  }\n  qDone(s, i) {\n    return s.answers[i] !== null && (s.answers[i] !== 'forComments' || (s.commentSent[i] && s.classification[i] !== null));\n  }\n\n  pick(choice) {\n    this.setState(s => {\n      const i = s.sheetFor;\n      if (i === null) return {};\n      const answers = s.answers.slice();\n      const commentSent = s.commentSent.slice();\n      const classification = s.classification.slice();\n      const wasSet = answers[i] !== null;\n      answers[i] = choice;\n      commentSent[i] = false;\n      classification[i] = null;\n      return { answers, commentSent, classification, sheetFor: null, changed: s.changed || wasSet };\n    });\n  }\n\n  renderVals() {\n    const s = this.state;\n    const labels = { for: '✅ בעד', forComments: '📝 בעד עם הערות', against: '❌ נגד', abstain: '⚪ נמנע' };\n    const isWa = s.view === 'wa';\n\n    const chip = (on) => ({\n      bg: on ? '#25D366' : '#FFFFFF',\n      color: on ? '#FFFFFF' : '#3D4A61',\n      border: on ? '#25D366' : '#D5DDE8'\n    });\n    const cFlow = chip(s.scenario === 'flow'), cRem = chip(s.scenario === 'reminder'),\n          cClosed = chip(s.scenario === 'closed'), cUnreg = chip(s.scenario === 'unregistered'),\n          cClsRem = chip(s.scenario === 'clsRem');\n\n    const nav = (on) => ({ bg: on ? '#1FA855' : 'transparent', color: on ? '#FFFFFF' : '#B9C3D6' });\n    const nPolls = nav(s.dashScreen === 'polls'), nCreate = nav(s.dashScreen === 'create'),\n          nResults = nav(s.dashScreen === 'results' || s.dashScreen === 'decision'),\n          nComments = nav(s.dashScreen === 'comments'),\n          nMembers = nav(s.dashScreen === 'members');\n\n    const setScreen = (scr) => () => this.setState({ dashScreen: scr });\n    const setScenario = (sc) => () => this.setState({\n      scenario: sc, started: false, sheetFor: null,\n      answers: [null, null], commentSent: [false, false], changed: false,\n      classification: [null, null], clsRem: null\n    });\n\n    const hints = {\n      flow: 'לחץ \"התחל הצבעה\" — הבוט מציג את השאלות אחת-אחת. \"בעד עם הערות\" מבקש הערה (כפתור השליחה הירוק), ואחריה שאלת סיווג: 💬 הערה בלבד (נספר כבעד) או ⚠️ תנאי לתמיכה (בעד מותנה). בסיום — סיכום עם אפשרות לשנות כל תשובה.',\n      clsRem: 'המשתמש שלח הערה אך לא ענה על שאלת הסיווג תוך 10 דקות — תזכורת עם אותם שני כפתורים (מסך 3א, F3א).',\n      reminder: 'תזכורת אוטומטית 3 שעות לפני סגירה (F5), עם המשך מהשאלה שבה עצר המצביע.',\n      closed: 'ניסיון הצבעה אחרי מועד הסגירה — הודעה מנומסת + תוצאה סופית לכל שאלה (F6).',\n      unregistered: 'מספר שאינו ברשימת החברים נדחה בנימוס ונרשם ללוג (F7, S1).'\n    };\n\n    // Per-question chat flow\n    const times = [['09:41', '09:42', '09:42'], ['09:43', '09:44', '09:44']];\n    const awaitingIdx = s.answers.findIndex((a, i) => a === 'forComments' && !s.commentSent[i]);\n    const awaiting = awaitingIdx !== -1;\n    const qFlow = this.questions.map((text, i) => {\n      const prevDone = i === 0 ? s.started : this.qDone(s, i - 1);\n      return {\n        text,\n        header: 'שאלה ' + (i + 1) + ' מתוך ' + this.questions.length,\n        headerShort: 'שאלה ' + (i + 1),\n        show: prevDone,\n        time: times[i][0], timeAns: times[i][1], timeCmt: times[i][2],\n        open: () => this.setState({ sheetFor: i }),\n        hasAnswer: s.answers[i] !== null,\n        answerLabel: s.answers[i] ? labels[s.answers[i]] : '',\n        showAsk: s.answers[i] === 'forComments' && !s.commentSent[i],\n        showComment: s.commentSent[i],\n        commentText: this.cannedComments[i],\n        timeCls: times[i][2],\n        showClsAsk: s.commentSent[i] && s.classification[i] === null,\n        showClsReply: s.classification[i] !== null,\n        clsReplyLabel: s.classification[i] === 'comment' ? '💬 הערה בלבד — תומך בכל מקרה' : '⚠️ תנאי לתמיכתי',\n        confirmComment: s.classification[i] === 'comment',\n        confirmCondition: s.classification[i] === 'condition',\n        clsComment: () => this.setState(st => { const classification = st.classification.slice(); classification[i] = 'comme es.counts[3], rPend: res.counts[4],\n      rForPct: res.pcts[0], rComPct: res.pcts[1], rAgPct: res.pcts[2], rAbPct: res.pcts[3], rPendPct: res.pcts[4],\n      rDashFor: segs[0].dash, rOffFor: segs[0].off,\n      rDashCom: segs[1].dash, rOffCom: segs[1].off,\n      rDashAg: segs[2].dash, rOffAg: segs[2].off,\n      rDashAb: segs[3].dash, rOffAb: segs[3].off,\n      rDashPend: segs[4].dash, rOffPend: segs[4].off,\n      rVotes: res.votes, rTableTitle: res.tableTitle,\n      rForNote: res.forNote, rNeeded: res.needed,\n      decGreen: res.hasMajority, decAmber: !res.hasMajority && !s.mgrDone,\n      goDecision: setScreen('decision'),\n      approveFinal: () => { if (res.hasMajority || s.mgrDone) this.showToast('התוצאה אושרה סופית — נרשמה בלוג הביקורת ותופיע בפרוטוקול'); },\n      approveDisabled: !res.hasMajority && !s.mgrDone,\n      approveBg: (res.hasMajority || s.mgrDone) ? '#178A45' : '#EDF1F7',\n      approveColor: (res.hasMajority || s.mgrDone) ? '#FFFFFF' : '#A5AFBE',\n      approveCursor: (res.hasMajority || s.mgrDone) ? 'pointer' : 'not-allowed',\n      approveTooltip: (res.hasMajority || s.mgrDone) ? 'אישור התוצאה ורישום בפרוטוקול' : 'לא ניתן לאשר — יש הצבעות מותנות שטרם הוכרעו',\n      sendReminder: () => this.showToast('נשלחה תזכורת ל-16 חברים שטרם הצביעו'),\n      exportCsv: () => this.showToast('קובץ CSV (UTF-8 עם BOM) מוכן להורדה — שורה לכל חבר ושאלה'),\n\n      // manager decision (F10)\n      mgrCards, backToResults: setScreen('results'),\n      simAccepted, simDropped, simPendingCnt: simPending, simTotal,\n      simVerdict: simPending > 0 ? 'טרם הוכרע' : (simTotal >= 30 ? 'המשאל עובר ✓' : 'המשאל אינו עובר'),\n      simBg: simPending > 0 ? '#FEF3E2' : (simTotal >= 30 ? '#E4F5EB' : '#FBEAEA'),\n      simColor: simPending > 0 ? '#B45309' : (simTotal >= 30 ? '#178A45' : '#C0392B'),\n      mgrConfirmDisabled: simPending > 0,\n      mgrConfirmBg: simPending > 0 ? '#EDF1F7' : '#16233F',\n      mgrConfirmColor: simPending > 0 ? '#A5AFBE' : '#FFFFFF',\n      mgrConfirmCursor: simPending > 0 ? 'not-allowed' : 'pointer',\n      mgrConfirmTip: simPending > 0 ? 'יש להכריע בכל ההצבעות המותנות' : 'פתיחת אישור סופי',\n      openMgrModal: () => { if (simPending === 0) this.setState({ mgrModal: true }); },\n      closeMgrModal: () => this.setState({ mgrModal: false }),\n      mgrModalOpen: s.mgrModal,\n      mgrModalSummary: 'התקבלו כבעד: ' + simAccepted + ' · לא נספרו / הוחזרו: ' + simDropped + '. סה\"כ בעד: ' + simTotal + ' מתוך 30 הנדרשים — ' + (simTotal >= 30 ? 'המשאל עובר.' : 'המשאל אינו עובר.'),\n      confirmMgr: () => {\n        this.setState({ mgrModal: false, mgrDone: true, dashScreen: 'results' });\n        this.showToast('החלטות המנהל נרשמו בלוג הביקורת ובפרוטוקול');\n      },\n\n      // comments\n      commentCards,\n      openCommentsCount: commentCards.filter(c => !c.done).length,\n\n      // members\n      members,\n      importCsv: () => this.showToast('ייבוא CSV — בחר קובץ עם עמודות: שם רשמי, טלפון'),\n      addMember: () => this.showToast('טופס הוספת חבר (הדגמה)'),\n\n      toast: s.toast\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
